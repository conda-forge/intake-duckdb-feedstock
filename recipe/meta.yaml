{% set name = "intake-duckdb" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/intake/intake-duckdb/archive/refs/tags/{{ version }}.tar.gz
  sha256: 0fb6685ed81a9602abf4f7d7867315f9ea469a0a095203b1bfbd6e9d3105467e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-git-versioning
    - pip
  run:
    - python >={{ python_min }}
    - intake
    - pandas
    - python-duckdb

test:
  imports:
    - intake_duckdb
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/intake/intake-duckdb
  summary: DuckDB plugin for Intake
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - blakerosenthal
